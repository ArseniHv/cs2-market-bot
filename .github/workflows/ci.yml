name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 src/ \
            --max-line-length=100 \
            --ignore=E501,W503,W504,E402,W292,F401,F841,F541,E261 \
            --exclude=__pycache__

      - name: Run logic tests (no DB required)
        run: |
          python -c "
          from src.analytics.tiers import get_alert_tier
          from src.analytics.trend import classify_trend
          from src.analytics.liquidity import interpret_liquidity
          assert get_alert_tier(60)[0] == 3
          assert classify_trend(3.0) == 'strong uptrend'
          assert interpret_liquidity(1.5) == 'highly liquid'
          print('All logic tests passed.')
          "